name: Release

# Builds the portable, single-file, self-contained Windows .exe and attaches it to a
# GitHub Release. Runs when a version tag (v*) is pushed; also runnable by hand against
# an existing tag via the Actions tab. The build recipe mirrors the local one exactly:
# everything (RID win-x64 / SelfContained / PublishSingleFile / compression) is baked
# into TheTagHag.csproj, so `dotnet publish` reproduces the same artifact on the runner.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v2.1.0)'
        required: true

permissions:
  contents: write          # required to create/update the GitHub Release

jobs:
  build-release:
    runs-on: windows-latest   # WinForms + WebView2 are Windows-only; the runner is Windows.
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve tag + version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') { $tag = $env:GITHUB_REF_NAME }
          else { $tag = '${{ github.event.inputs.tag }}' }
          if (-not $tag) { throw 'No tag could be resolved.' }
          $version = $tag.TrimStart('v')
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building $tag (version $version)"

      - name: Publish single-file self-contained exe
        shell: pwsh
        run: dotnet publish TheTagHag.csproj -c Release -o publish --nologo

      - name: Verify the exe version matches the tag
        shell: pwsh
        run: |
          $exe = 'publish/TheTagHag.exe'
          if (-not (Test-Path $exe)) { throw "Publish produced no exe at $exe" }
          $fv   = (Get-Item $exe).VersionInfo.FileVersion
          $want = '${{ steps.ver.outputs.version }}'
          Write-Host "exe FileVersion=$fv   tag version=$want"
          if (-not $fv.StartsWith($want)) {
            throw "Version mismatch: the exe is $fv but the tag is v$want. Bump <Version> in TheTagHag.csproj to match the tag before releasing."
          }

      - name: Create or update the GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = '${{ steps.ver.outputs.tag }}'
          $version = '${{ steps.ver.outputs.version }}'
          $asset   = 'publish/TheTagHag.exe'

          # Release notes come from the matching CHANGELOG.md section. Fall back to
          # GitHub's auto-generated notes when this version has no entry (e.g. old tags).
          $notesArgs = @('--generate-notes')
          if (Test-Path 'CHANGELOG.md') {
            $lines = Get-Content 'CHANGELOG.md' -Encoding utf8
            $start = -1
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match ('^##\s+\[' + [regex]::Escape($version) + '\]')) { $start = $i; break }
            }
            if ($start -ge 0) {
              $body = @()
              for ($j = $start + 1; $j -lt $lines.Count; $j++) {
                if ($lines[$j] -match '^##\s+\[') { break }
                $body += $lines[$j]
              }
              $text = ($body -join "`n").Trim()
              if ($text) {
                $footer = "`n`n**Full changelog:** https://github.com/AngryMunky/tag-hag/blob/main/CHANGELOG.md"
                Set-Content -Path 'notes.md' -Value ($text + $footer) -Encoding utf8
                $notesArgs = @('--notes-file', 'notes.md')
                Write-Host "Using CHANGELOG.md notes for $tag."
              }
            }
          }
          if ($notesArgs[0] -eq '--generate-notes') {
            Write-Host "No CHANGELOG entry for $version - using auto-generated notes."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag exists - clobbering asset + refreshing notes."
            gh release upload $tag $asset --clobber
            if ($notesArgs[0] -eq '--notes-file') { gh release edit $tag --notes-file notes.md }
          } else {
            Write-Host "Creating release $tag."
            gh release create $tag $asset --title "The Tag Hag $tag" @notesArgs
          }

      - name: Upload the build artifact (always downloadable from the run)
        uses: actions/upload-artifact@v4
        with:
          name: TheTagHag-${{ steps.ver.outputs.tag }}-win-x64
          path: publish/TheTagHag.exe
          if-no-files-found: error
